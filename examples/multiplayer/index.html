<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        margin: 20px;
        padding: 0;
      }

      form {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .game {
        background-color: black;
        gap: 2px;
        aspect-ratio: 1 / 1;
        width: 12rem;
        /* display: grid; */
        display: none;
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: repeat(3, 1fr);

        button {
          background-color: white;
          border: none;
          font-size: 3rem;
          font-weight: 800;

          &:not(:disabled):hover {
            background-color: lightgray;
          }
        }
      }

      .reset {
        margin-block: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe!</h1>
    <p class="hint"></p>
    <form>
      <input name="id" type="number" placeholder="000000" />
      <button class="join" type="button">Join Game</button>
      <p>or</p>
      <button class="create" type="button">Create Game</button>
    </form>
    <div class="game">
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
    </div>
  </body>
</html>
