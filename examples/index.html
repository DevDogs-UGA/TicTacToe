<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        margin: 20px;
        padding: 0;
      }

      .game {
        background-color: black;
        gap: 2px;
        aspect-ratio: 1 / 1;
        width: 12rem;
        display: grid;
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: repeat(3, 1fr);

        button {
          background-color: white;
          border: none;
          font-size: 3rem;
          font-weight: 800;

          &:not(:disabled):hover {
            background-color: lightgray;
          }
        }
      }

      .reset {
        margin-block: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe!</h1>
    <p class="hint"></p>
    <div class="game">
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
      <button type="button"></button>
    </div>
    <button class="reset">Reset Game</button>
    <script>
      const gameState = ["", "", "", "", "", "", "", "", ""];
      let turn = "X";

      const winningStates = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      const hint = document.querySelector(".hint");
      const resetButton = document.querySelector(".reset");
      const gameButtons = document.querySelectorAll(".game button");

      gameButtons.forEach((button, i) => {
        button.addEventListener("click", () => {
          if (turn !== null && gameState[i] === "") {
            button.innerText = turn;
            gameState[i] = turn;

            for (const [a, b, c] of winningStates) {
              if (
                gameState[a] !== "" &&
                gameState[a] === gameState[b] &&
                gameState[a] === gameState[c]
              ) {
                hint.innerText = `${turn} wins!`;
                turn = null;
                return;
              }
            }

            turn = turn === "X" ? "O" : "X";
          }
        });
      });

      resetButton.addEventListener("click", () => {
        gameButtons.forEach((button, i) => {
          button.innerText = "";
          gameState[i] = "";
        });

        hint.innerText = "";
        turn = "X";
      });
    </script>
  </body>
</html>
